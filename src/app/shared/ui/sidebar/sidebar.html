<aside
  class="sidebar"
  [class.sidebar--expandida]="expandida()"
  [style.width]="widthPx()"
  aria-label="Navegación principal"
>
  <div class="sidebar__brand">
    <button
      class="sidebar__hamburguesa"
      type="button"
      title="Mostrar/ocultar etiquetas"
      aria-label="Expandir o colapsar menú"
      [attr.aria-expanded]="expandida()"
      (click)="toggle()"
    >
      <app-icon name="menu" />
    </button>
    @if (expandida()) {
      <app-logo class="sidebar__marca" size="sm" />
    }
  </div>

  <nav class="sidebar__nav">
    @for (item of itemsIn('top'); track item.id) {
      <button
        class="sidebar__item"
        type="button"
        [class.sidebar__item--active]="item.id === activeId()"
        [attr.aria-label]="item.label"
        [attr.title]="item.label"
        (click)="itemSelected.emit(item.id)"
      >
        <span class="sidebar__icon"><app-icon [name]="item.icon" /></span>
        @if (expandida()) {
          <span class="sidebar__label">{{ item.label }}</span>
        }
      </button>
    }
  </nav>

  <div class="sidebar__section sidebar__section--bottom">
    @for (item of itemsIn('bottom'); track item.id) {
      <button
        class="sidebar__item"
        type="button"
        [class.sidebar__item--active]="item.id === activeId()"
        [attr.aria-label]="item.label"
        [attr.title]="item.label"
        (click)="itemSelected.emit(item.id)"
      >
        <span class="sidebar__icon"><app-icon [name]="item.icon" /></span>
        @if (expandida()) {
          <span class="sidebar__label">{{ item.label }}</span>
        }
      </button>
    }
  </div>

  <div class="sidebar__footer">
    <button
      type="button"
      class="sidebar__avatar"
      [attr.title]="pieTexto()"
      aria-label="Menú de perfil"
      (click)="avatarClicked.emit()"
    >
      {{ avatarIniciales() }}
    </button>
    @if (expandida()) {
      <div class="sidebar__pie-texto">{{ pieTexto() }}</div>
    }
  </div>
</aside>
