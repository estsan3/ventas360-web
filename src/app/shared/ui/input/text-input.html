<div class="field">
  @if (label()) {
    <label class="field__label" [for]="inputId">{{ label() }}</label>
  }
  <input
    class="field__input"
    [class.field__input--error]="!!error()"
    [id]="inputId"
    [type]="type()"
    [placeholder]="placeholder()"
    [value]="value()"
    [disabled]="disabled()"
    (input)="handleInput($event)"
    (blur)="onTouched()"
  />
  @if (error()) {
    <span class="field__error">{{ error() }}</span>
  }
</div>
