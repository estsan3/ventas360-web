<header class="topbar">
  <div class="topbar__brand">
    <app-logo size="sm" />
  </div>

  <nav class="topbar__nav" aria-label="Principal">
    @for (item of items(); track item.id) {
      <button
        type="button"
        class="topbar__nav-btn"
        [class.topbar__nav-btn--active]="activeId() === item.id"
        (click)="seleccionar(item.id)"
      >
        {{ item.label }}
      </button>
    }
  </nav>

  <div class="topbar__right">
    <div class="topbar__ctx">Suc. Central · Caja 1</div>
    @if (authStore.user(); as user) {
      <div class="topbar__perfil-wrap">
        <button
          class="topbar__avatar"
          type="button"
          aria-label="Menú de perfil"
          [attr.aria-expanded]="menuPerfilAbierto()"
          [attr.title]="user.nombre"
          (click)="menuPerfilAbierto.set(!menuPerfilAbierto())"
        >
          {{ iniciales() }}
        </button>

        @if (menuPerfilAbierto()) {
          <button
            class="topbar__menu-backdrop"
            type="button"
            aria-label="Cerrar menú"
            (click)="menuPerfilAbierto.set(false)"
          ></button>
          <div class="topbar__menu" role="menu">
            <div class="topbar__menu-user">
              <strong>{{ user.nombre }}</strong>
              <small>{{ user.rol === 'administrador' ? 'Administrador' : 'Vendedor' }}</small>
            </div>
            <button type="button" role="menuitem" (click)="irAConfiguracion()">
              Configuración
            </button>
            <button
              type="button"
              role="menuitem"
              class="topbar__menu-salir"
              (click)="cerrarSesion()"
            >
              Cerrar sesión
            </button>
          </div>
        }
      </div>
    }
  </div>
</header>
