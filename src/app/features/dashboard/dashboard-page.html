<section class="page">
  <header class="page__header">
    <p class="page__subtitle">Métricas de ventas y actividad de agentes de IA</p>
  </header>

  <div class="kpis">
    <app-kpi-card
      tone="brand"
      label="Ventas del día"
      value="$ 248.500"
      trend="+8%"
      trendTone="good"
    >
      <app-icon name="dollar" />
    </app-kpi-card>
    <app-kpi-card
      tone="green"
      label="Pedidos"
      value="34"
      trend="+5"
      trendTone="neutral"
      detail="12 pendientes de confirmación"
    >
      <app-icon name="package" />
    </app-kpi-card>
    <app-kpi-card tone="orange" label="Clientes activos" value="128" trend="+3" trendTone="neutral">
      <app-icon name="user" />
    </app-kpi-card>
    <app-kpi-card
      tone="neutral"
      label="Agentes en curso"
      value="6"
      detail="2 cotizando, 4 en seguimiento"
    >
      <app-icon name="message" />
    </app-kpi-card>
  </div>

  <p class="page__note">
    Los agentes de IA gestionan seguimiento y cotizaciones automáticamente. Los números son
    demostrativos hasta conectar la API de ventas.
  </p>
</section>
